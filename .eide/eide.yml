version: "4.1"
name: titest
type: ARM
deviceName: MSPM0G3507
packDir: .pack/TexasInstruments/MSPM0G1X0X_G3X0X_DFP.1.3.1
srcDirs:
  - core
  - gcc
  - ti
  - user
  - bsp
  - package
virtualFolder:
  name: <virtual_root>
  files:
    - path: sys_stubs.c
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: c73a2fb4d5db94ed823f8eeb435db990
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - PART_MSPM0G3507
        - DeviceFamily_MSPM0G350X
        - __MSPM0G3507__
      incList:
        - .
        - ti
        - ti/third_party/CMSIS/Core/Include
        - core
        - ti/third_party/CMSIS/DSP/Include
        - ti/third_party/CMSIS/DSP/PrivateInclude
        - bsp
        - package
      libList:
        - ti/third_party/CMSIS/DSP/lib/gcc
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c99
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-0
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: '"gcc\device_linker.lds"'
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: MSPM0G3507
          vendor: TI
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: stlink
        target: stm32f1x
    uploader: JLink
